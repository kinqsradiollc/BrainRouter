# Dependabot keeps npm dependencies and GitHub Actions versions current
# without drowning us in PRs. Strategy:
#   - npm minor/patch updates: grouped weekly so dev-deps + production-deps
#     each land in one PR per week instead of one PR per dependency.
#   - npm major updates: IGNORED while we stabilize 0.3.6. We bump majors
#     manually after the release so we can verify behaviour (Next 16,
#     dotenv 17, ora 9, etc. each have real breaking changes that CI
#     alone won't catch). Re-enable by removing the ignore block below.
#   - GitHub Actions: monthly, grouped, ungrouped majors allowed (Action
#     version bumps are usually metadata-only and low-risk).
#
# IMPORTANT: this repo uses npm workspaces. There is exactly ONE
# package-lock.json at the root — Dependabot updates EVERY workspace's
# package.json from that one entry. Do NOT add per-workspace directory
# entries; that caused the duplicate-PR problem that motivated this fix
# (one PR per directory all touching the same lockfile).

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    ignore:
      # Block all major-version PRs while 0.3.6 is in flight. Delete
      # this block after 0.3.6 ships if you want majors back as
      # individual PRs.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      # Listed FIRST so react / react-dom always land in this group
      # instead of leaking into `production-minor-patch`. Dependabot
      # evaluates groups top-down; first match wins.
      #
      # Why: Next.js refuses to build if `react` and `react-dom` are
      # at different versions ("Incompatible React versions" — verified
      # on the closed Dependabot PR #21). Without this group, a minor
      # bump on `react` opened a PR that didn't also bump `react-dom`,
      # which broke the dashboard build every Monday.
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "chore(actions)"
